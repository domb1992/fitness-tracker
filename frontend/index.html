<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <!-- Theme colour: light/dark variants so the status bar matches the active theme -->
    <meta name="theme-color" content="#f7f4f0" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0B0C0E"  media="(prefers-color-scheme: dark)" />

    <!-- iOS "Add to Home Screen" PWA support -->
    <meta name="apple-mobile-web-app-capable"          content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title"            content="FitTrack" />

    <!-- Generic web-app / Windows tile meta -->
    <meta name="application-name"    content="FitTrack" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="msapplication-TileColor" content="#0B0C0E" />

    <link rel="icon"             type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon"             type="image/x-icon"  href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon"                      href="/apple-touch-icon-180x180.png" />

    <title>FitTrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&family=Roboto+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
